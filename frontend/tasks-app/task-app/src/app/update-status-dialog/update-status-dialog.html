<h2 mat-dialog-title>Update Task </h2>
<mat-dialog-content>
  <mat-form-field>
    <mat-label>Update Task Status</mat-label>
    <input matInput [(ngModel)]="task" />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="onNoClick()">Cancel</button>
  <button matButton [mat-dialog-close]="task()" cdkFocusInitial>Ok</button>
</mat-dialog-actions>
