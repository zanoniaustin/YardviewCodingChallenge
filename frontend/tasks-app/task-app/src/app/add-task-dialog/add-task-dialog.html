<h2 mat-dialog-title>Update Task </h2>
<mat-dialog-content>
  <mat-form-field>
    <mat-label>Task Title Status</mat-label>
    <input matInput [(ngModel)]="data.title" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Task Description</mat-label>
    <input matInput [(ngModel)]="data.description" />
  </mat-form-field>
</mat-dialog-content>
<mat-dialog-actions>
  <button matButton (click)="onNoClick()">Cancel</button>
  <button matButton [mat-dialog-close]="add()" cdkFocusInitial>Add Task</button>
</mat-dialog-actions>
